<style>
  :root { color-scheme: dark; --brand1:#22d3ee; --brand2:#2563eb; }
  *{ font-family:'Satoshi','Inter',system-ui,sans-serif; }
  body{ background:#000; color:#fff; overflow-x:hidden; }
  h1,h2,h3,.display{ font-family:'Clash Display','Satoshi',sans-serif; letter-spacing:-.02em; }

  /* Surfaces */
  .glass{ background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02) 65%); border:1px solid rgba(255,255,255,.10); box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 8px 32px 0 rgba(0,0,0,.36); }

  .glass-hover:hover{ background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.04) 65%); border-color:rgba(255,255,255,.2); transform:translateY(-5px); }

  .text-gradient{ background:linear-gradient(90deg,#fff,rgba(255,255,255,.82),rgba(255,255,255,.55)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .text-brand{ background:linear-gradient(90deg,#67e8f9,#38bdf8,#2563eb); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .bg-brand{ background:linear-gradient(90deg,#22d3ee,#2563eb); }

  /* Ambient background */
  .grid-bg{ position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:64px 64px; mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 30%,transparent 75%); }
  .noise{ position:fixed; inset:0; z-index:60; pointer-events:none; opacity:.04; mix-blend-mode:overlay; }

  @keyframes blob{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.9)}100%{transform:translate(0,0) scale(1)}}
  .animate-blob{ animation:blob 12s infinite; }
  .delay-2000{ animation-delay:2s } .delay-4000{ animation-delay:4s }
  @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
  .animate-ping{ animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite; }

  /* Reveal */
  .reveal{ opacity:0; transform:translateY(30px); filter:blur(8px); transition:opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1), filter .8s; }
  .reveal.in{ opacity:1; transform:none; filter:blur(0); }
  .word{ display:inline-block; opacity:0; transform:translateY(110%) rotate(3deg); transition:opacity .7s, transform .7s cubic-bezier(.2,.85,.2,1); }
  .word.in{ opacity:1; transform:none; }
  .word-wrap{ display:inline-block; overflow:hidden; vertical-align:top; padding-bottom:.06em; }

  html.lenis,html.lenis body{ height:auto } .lenis.lenis-smooth{ scroll-behavior:auto!important }

  /* Custom cursor */
  .cur{ position:fixed; top:0; left:0; width:14px; height:14px; border-radius:50%; background:#fff; pointer-events:none; z-index:90; mix-blend-mode:difference; transform:translate(-50%,-50%); transition:width .25s,height .25s,background .25s; }
  .cur.big{ width:64px; height:64px; background:#fff; }
  .cur-ring{ position:fixed; top:0; left:0; width:38px; height:38px; border:1px solid rgba(255,255,255,.4); border-radius:50%; pointer-events:none; z-index:90; transform:translate(-50%,-50%); transition:width .3s,height .3s,opacity .3s; }
  @media (hover:none){ .cur,.cur-ring{ display:none } }

  ::selection{ background:rgba(34,211,238,.25); }
  .nav-scrolled{ padding-top:.6rem!important; padding-bottom:.6rem!important; }
  .scroll-hint{ pointer-events:none; }
  @media (max-height:820px){ .scroll-hint{ display:none!important; } }
  #toTop{ position:fixed; right:24px; bottom:24px; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:70; cursor:pointer; color:#fff; transform:translateX(120px); opacity:0; transition:transform .45s cubic-bezier(.2,.85,.2,1), opacity .45s, background .3s, border-color .3s; }
  #toTop.show{ transform:translateX(0); opacity:1; }
  #toTop:hover{ transform:translateX(0) translateY(-4px); }
  #toTop svg{ transition:transform .3s; }
  #toTop:hover svg{ transform:translateY(-2px); }
  #progress{ position:fixed; top:0; left:0; height:3px; width:0; z-index:80; background:linear-gradient(90deg,#22d3ee,#2563eb); }

  /* Intro */
  #intro{ position:fixed; inset:0; z-index:100; background:#000; display:flex; align-items:center; justify-content:center; transition:opacity .5s ease, visibility .5s; }
  #intro.hide{ opacity:0; visibility:hidden; }
  #intro .lg{ font-family:'Clash Display'; font-weight:700; font-size:clamp(2.5rem,8vw,5rem); letter-spacing:.02em; }
  .intro-rise{ display:inline-block; opacity:0; transform:translateY(120%); animation:rise .8s cubic-bezier(.2,.85,.2,1) forwards; }
  .intro-wrap{ display:inline-block; overflow:hidden; vertical-align:top; }
  @keyframes rise{to{opacity:1;transform:none}}

  .marquee{ display:flex; gap:3rem; white-space:nowrap; animation:scrollx 28s linear infinite; }
  @keyframes scrollx{to{transform:translateX(-50%)}}

  .field{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 18px; width:100%; color:#fff; transition:border-color .25s, background .25s; }
  .field:focus{ outline:none; border-color:#22d3ee; background:rgba(255,255,255,.06); }
  .field::placeholder{ color:rgba(255,255,255,.4); }
  .pill{ padding:8px 16px; border-radius:999px; border:1px solid rgba(255,255,255,.14); font-size:14px; cursor:pointer; transition:all .2s; }
  .pill.active{ background:linear-gradient(90deg,#22d3ee,#2563eb); border-color:transparent; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none!important; transition:none!important; }
    .reveal,.word{ opacity:1!important; transform:none!important; filter:none!important; }
  }
</style>
</head>

function revealWords(el){ el.querySelectorAll('.word').forEach((w,i)=>{ setTimeout(()=>w.classList.add('in'), 60*i); }); }

function countUp(el){
  const to=parseFloat(el.dataset.to), suf=el.dataset.suf||''; let cur=0; const dur=1400, t0=performance.now();
  function step(t){ const p=Math.min((t-t0)/dur,1); const e=1-Math.pow(1-p,3); el.textContent=Math.round(to*e)+suf; if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

function heroCanvas(){
  if(RM) return;
  const c=$('#hero-canvas'), x=c.getContext('2d'); const dpr=Math.min(devicePixelRatio||1,2);
  let w=0,h=0,pts=[]; const mouse={x:-9999,y:-9999};
  function size(){
    w=c.clientWidth||c.offsetWidth||window.innerWidth; h=c.clientHeight||c.offsetHeight||window.innerHeight;
    c.width=w*dpr; c.height=h*dpr; x.setTransform(dpr,0,0,dpr,0,0);
    if(!pts.length && w>10 && h>10){ const N=Math.max(26,Math.min(w<640?42:110,Math.round(w*h/12500)));
      for(let i=0;i<N;i++) pts.push({x:Math.random()*w,y:Math.random()*h,bx:(Math.random()-.5)*.22,by:(Math.random()-.5)*.22,vx:0,vy:0}); }
  }
  size(); window.addEventListener('resize',size); window.addEventListener('load',size);
  window.addEventListener('mousemove',e=>{ const r=c.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });
  window.addEventListener('mouseleave',()=>{ mouse.x=-9999; mouse.y=-9999; });
  const LINK=130, R=160;
  function loop(){
    x.clearRect(0,0,w,h);
    // Move: gentle base drift + repulsion away from the cursor with friction
    for(const p of pts){
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.hypot(dx,dy);
      if(d<R && d>0.5){ const f=(1-d/R)*1.2; p.vx+=(dx/d)*f; p.vy+=(dy/d)*f; }
      p.vx*=0.92; p.vy*=0.92;
      p.x+=p.vx+p.bx; p.y+=p.vy+p.by;
      if(p.x<0||p.x>w) p.bx*=-1;
      if(p.y<0||p.y>h) p.by*=-1;
      p.x=Math.max(0,Math.min(w,p.x)); p.y=Math.max(0,Math.min(h,p.y));
    }
    // Links between nearby particles
    for(let i=0;i<pts.length;i++){
      const a=pts[i];
      for(let j=i+1;j<pts.length;j++){ const b=pts[j],dd=Math.hypot(a.x-b.x,a.y-b.y);
        if(dd<LINK){ x.strokeStyle=`rgba(56,189,248,${.22*(1-dd/LINK)})`; x.lineWidth=1; x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke(); } }
    }
    // Nodes: glow brighter the closer they are to the cursor
    for(const p of pts){
      const dm=Math.hypot(p.x-mouse.x,p.y-mouse.y), near=dm<R;
      x.fillStyle = near ? `rgba(165,243,252,${.4+.5*(1-dm/R)})` : 'rgba(103,232,249,.6)';
      x.beginPath(); x.arc(p.x,p.y, near?2.4:1.6, 0,7); x.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
}

  $$('.lang-btn').forEach(b=> b.addEventListener('click',()=>{ lang=b.dataset.lang==='uk'?0:1; applyLang(); }));

  // reveal observer
  const io=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); if(e.target.classList.contains('split')){e.target.classList.add('seen');revealWords(e.target);} e.target.querySelectorAll&&e.target.querySelectorAll('.num').forEach(countUp); io.unobserve(e.target);} }); },{threshold:.15});
  $$('.reveal,.split').forEach(el=>io.observe(el));
  $$('.num').forEach(n=>{ const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){countUp(e.target);ob.unobserve(e.target);}})},{threshold:.5}); ob.observe(n); });

  // Lenis smooth scroll
  if(!RM && window.Lenis){
    const lenis=new Lenis({duration:1.1,smoothWheel:true}); window.__lenis=lenis;
    function raf(t){ lenis.raf(t); requestAnimationFrame(raf); } requestAnimationFrame(raf);
    $$('a[href^="#"]').forEach(a=>a.addEventListener('click',e=>{ const id=a.getAttribute('href'); if(id.length>1){ e.preventDefault(); lenis.scrollTo(id,{offset:-80}); } }));
  }

  // progress + navbar + parallax
  const prog=$('#progress'), nav=$('#nav');
  function onScroll(){ const sc=window.scrollY, max=document.body.scrollHeight-innerHeight; prog.style.width=(sc/max*100)+'%'; nav.classList.toggle('nav-scrolled',sc>50);
    if(!RM) $$('.parallax').forEach(p=> p.style.transform=`translateY(${sc*parseFloat(p.dataset.speed)*-0.15}px)`); }
  window.addEventListener('scroll',onScroll,{passive:true});

  // custom cursor + magnetic
  const cur=$('.cur'), ring=$('.cur-ring'); let mx=0,my=0,rx=0,ry=0;
  window.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
  function ringLoop(){ rx+=(mx-rx)*.18; ry+=(my-ry)*.18; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(ringLoop); } ringLoop();
  $$('[data-cursor]').forEach(el=>{ el.addEventListener('mouseenter',()=>{cur.classList.add('big');ring.style.opacity=0;}); el.addEventListener('mouseleave',()=>{cur.classList.remove('big');ring.style.opacity=1;}); });
  if(!RM) $$('.magnetic').forEach(el=>{
    el.addEventListener('mousemove',e=>{ const r=el.getBoundingClientRect(); const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2); el.style.transform=`translate(${dx*.3}px,${dy*.4}px)`; });
    el.addEventListener('mouseleave',()=> el.style.transform='');
  });

  // back-to-top button
  const toTop=$('#toTop');
  if(toTop){
    window.addEventListener('scroll',()=>{ toTop.classList.toggle('show', window.scrollY>600); },{passive:true});
    toTop.addEventListener('click',()=>{ if(window.__lenis) window.__lenis.scrollTo(0,{duration:1}); else window.scrollTo({top:0,behavior:'smooth'}); });
  }

  // budget pills
  $('#budget-pills').addEventListener('click',e=>{ if(e.target.classList.contains('pill')){ $$('#budget-pills .pill').forEach(p=>p.classList.remove('active')); e.target.classList.add('active'); } });
  // form submit
  $('#form').addEventListener('submit',e=>{ e.preventDefault(); if(!e.target.name.value||!e.target.email.value) return; $('#form-ok').classList.remove('hidden'); e.target.querySelector('button[type=submit]').style.display='none'; });
});
