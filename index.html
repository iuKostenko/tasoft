<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TASoft — Розробка та супровід ПЗ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; --brand1:#22d3ee; --brand2:#2563eb; }
  *{ font-family:'Satoshi','Inter',system-ui,sans-serif; }
  body{ background:#000; color:#fff; overflow-x:hidden; }
  h1,h2,h3,.display{ font-family:'Clash Display','Satoshi',sans-serif; letter-spacing:-.02em; }

  /* Surfaces */
  .glass{ background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02) 65%); border:1px solid rgba(255,255,255,.10); box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 8px 32px 0 rgba(0,0,0,.36); }
  .glass-hover{ transition:transform .35s cubic-bezier(.2,.8,.2,1), background .35s, border-color .35s; }
  .glass-hover:hover{ background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.04) 65%); border-color:rgba(255,255,255,.2); transform:translateY(-5px); }
  #nav .glass{ backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
  .text-gradient{ background:linear-gradient(90deg,#fff,rgba(255,255,255,.82),rgba(255,255,255,.55)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .text-brand{ background:linear-gradient(90deg,#67e8f9,#38bdf8,#2563eb); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .bg-brand{ background:linear-gradient(90deg,#22d3ee,#2563eb); }

  /* Ambient background */
  .grid-bg{ position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:64px 64px; mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 30%,transparent 75%); }
  .noise{ position:fixed; inset:0; z-index:60; pointer-events:none; opacity:.04; mix-blend-mode:overlay; }

  @keyframes blob{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-50px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.9)}100%{transform:translate(0,0) scale(1)}}
  .animate-blob{ animation:blob 12s infinite; }
  .delay-2000{ animation-delay:2s } .delay-4000{ animation-delay:4s }
  @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
  .animate-ping{ animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite; }

  /* Reveal */
  .reveal{ opacity:0; transform:translateY(30px); filter:blur(8px); transition:opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1), filter .8s; }
  .reveal.in{ opacity:1; transform:none; filter:blur(0); }
  .word{ display:inline-block; opacity:0; transform:translateY(110%) rotate(3deg); transition:opacity .7s, transform .7s cubic-bezier(.2,.85,.2,1); }
  .word.in{ opacity:1; transform:none; }
  .word-wrap{ display:inline-block; overflow:hidden; vertical-align:top; padding-bottom:.06em; }

  html.lenis,html.lenis body{ height:auto } .lenis.lenis-smooth{ scroll-behavior:auto!important }

  /* Custom cursor */
  .cur{ position:fixed; top:0; left:0; width:14px; height:14px; border-radius:50%; background:#fff; pointer-events:none; z-index:90; mix-blend-mode:difference; transform:translate(-50%,-50%); transition:width .25s,height .25s,background .25s; }
  .cur.big{ width:64px; height:64px; background:#fff; }
  .cur-ring{ position:fixed; top:0; left:0; width:38px; height:38px; border:1px solid rgba(255,255,255,.4); border-radius:50%; pointer-events:none; z-index:90; transform:translate(-50%,-50%); transition:width .3s,height .3s,opacity .3s; }
  @media (hover:none){ .cur,.cur-ring{ display:none } }

  ::selection{ background:rgba(34,211,238,.25); }
  .nav-scrolled{ padding-top:.6rem!important; padding-bottom:.6rem!important; }
  .scroll-hint{ pointer-events:none; }
  @media (max-height:820px){ .scroll-hint{ display:none!important; } }
  #toTop{ position:fixed; right:24px; bottom:24px; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:70; cursor:pointer; color:#fff; transform:translateX(120px); opacity:0; transition:transform .45s cubic-bezier(.2,.85,.2,1), opacity .45s, background .3s, border-color .3s; }
  #toTop.show{ transform:translateX(0); opacity:1; }
  #toTop:hover{ transform:translateX(0) translateY(-4px); }
  #toTop svg{ transition:transform .3s; }
  #toTop:hover svg{ transform:translateY(-2px); }
  #progress{ position:fixed; top:0; left:0; height:3px; width:0; z-index:80; background:linear-gradient(90deg,#22d3ee,#2563eb); }

  /* Intro */
  #intro{ position:fixed; inset:0; z-index:100; background:#000; display:flex; align-items:center; justify-content:center; transition:opacity .5s ease, visibility .5s; }
  #intro.hide{ opacity:0; visibility:hidden; }
  #intro .lg{ font-family:'Clash Display'; font-weight:700; font-size:clamp(2.5rem,8vw,5rem); letter-spacing:.02em; }
  .intro-rise{ display:inline-block; opacity:0; transform:translateY(120%); animation:rise .8s cubic-bezier(.2,.85,.2,1) forwards; }
  .intro-wrap{ display:inline-block; overflow:hidden; vertical-align:top; }
  @keyframes rise{to{opacity:1;transform:none}}

  .marquee{ display:flex; gap:3rem; white-space:nowrap; animation:scrollx 28s linear infinite; }
  @keyframes scrollx{to{transform:translateX(-50%)}}

  .field{ background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 18px; width:100%; color:#fff; transition:border-color .25s, background .25s; }
  .field:focus{ outline:none; border-color:#22d3ee; background:rgba(255,255,255,.06); }
  .field::placeholder{ color:rgba(255,255,255,.4); }
  .pill{ padding:8px 16px; border-radius:999px; border:1px solid rgba(255,255,255,.14); font-size:14px; cursor:pointer; transition:all .2s; }
  .pill.active{ background:linear-gradient(90deg,#22d3ee,#2563eb); border-color:transparent; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none!important; transition:none!important; }
    .reveal,.word{ opacity:1!important; transform:none!important; filter:none!important; }
  }

  /* Theme toggle icons */
  .ic-sun{ display:none; } html.light .ic-sun{ display:block; } html.light .ic-moon{ display:none; }

  /* ---------- LIGHT THEME ---------- */
  html.light body{ background:#eef1f6; color:#0b1220; }
  html.light .bg-black{ background-color:#eef1f6 !important; }
  html.light .selection\:bg-cyan-400\/20::selection{ background:rgba(34,211,238,.2); }
  html.light .text-white{ color:#0b1220 !important; }
  html.light .text-white\/40{ color:rgba(11,18,32,.55)!important; }
  html.light .text-white\/45{ color:rgba(11,18,32,.55)!important; }
  html.light .text-white\/50{ color:rgba(11,18,32,.6)!important; }
  html.light .text-white\/55{ color:rgba(11,18,32,.65)!important; }
  html.light .text-white\/60{ color:rgba(11,18,32,.7)!important; }
  html.light .text-white\/65{ color:rgba(11,18,32,.72)!important; }
  html.light .text-white\/70{ color:rgba(11,18,32,.78)!important; }
  html.light .text-white\/75{ color:rgba(11,18,32,.8)!important; }
  html.light .text-white\/80{ color:rgba(11,18,32,.85)!important; }
  html.light .text-white\/85{ color:rgba(11,18,32,.88)!important; }
  html.light .text-white\/15{ color:rgba(11,18,32,.12)!important; }
  html.light .border-white\/5{ border-color:rgba(11,18,32,.08)!important; }
  html.light .border-white\/10{ border-color:rgba(11,18,32,.10)!important; }
  html.light .border-white\/15{ border-color:rgba(11,18,32,.14)!important; }
  html.light .border-white\/20{ border-color:rgba(11,18,32,.18)!important; }
  html.light .bg-white\/5{ background-color:rgba(11,18,32,.05)!important; }
  html.light .bg-white\/10{ background-color:rgba(11,18,32,.08)!important; }
  html.light .glass{ background:linear-gradient(160deg,rgba(255,255,255,.9),rgba(255,255,255,.6) 65%); border:1px solid rgba(11,18,32,.08); box-shadow:inset 0 1px 0 rgba(255,255,255,.8), 0 12px 36px -14px rgba(11,18,32,.22); }
  html.light .glass-hover:hover{ background:linear-gradient(160deg,rgba(255,255,255,1),rgba(255,255,255,.75) 65%); border-color:rgba(11,18,32,.14); }
  html.light #nav .glass{ background:rgba(255,255,255,.7)!important; }
  html.light .text-gradient{ background:linear-gradient(90deg,#0b1220,rgba(11,18,32,.8),rgba(11,18,32,.55)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  html.light .grid-bg{ background-image:linear-gradient(rgba(11,18,32,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(11,18,32,.05) 1px,transparent 1px); }
  html.light .field{ background:rgba(11,18,32,.04); border-color:rgba(11,18,32,.14); color:#0b1220; }
  html.light .field::placeholder{ color:rgba(11,18,32,.4); }
  html.light .pill{ border-color:rgba(11,18,32,.18); }
  html.light .noise{ opacity:.02; }
  html.light .lang-btn:not(.bg-white){ color:rgba(11,18,32,.6); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro"><div class="lg">TA<span class="text-brand">SOFT</span></div></div>

<!-- AMBIENT -->
<div class="grid-bg"></div>
<svg class="noise"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>
<div id="progress"></div>
<div class="cur"></div><div class="cur-ring"></div>

<!-- NAVBAR -->
<nav id="nav" class="fixed top-0 left-0 right-0 z-50 px-6 py-6 transition-all duration-300">
  <div class="max-w-7xl mx-auto rounded-full flex items-center justify-between px-6 py-3 glass" style="background:rgba(0,0,0,.45)">
    <a href="#" class="text-2xl font-bold tracking-wide" data-cursor>TA<span class="text-brand">SOFT</span></a>
    <div class="hidden md:flex items-center gap-7">
      <a href="#services" class="navlink text-sm font-medium text-white/75 hover:text-white transition-colors" data-i="nav.services"></a>
      <a href="#process" class="navlink text-sm font-medium text-white/75 hover:text-white transition-colors" data-i="nav.process"></a>
      <a href="#team" class="navlink text-sm font-medium text-white/75 hover:text-white transition-colors" data-i="nav.team"></a>
      <a href="#about" class="navlink text-sm font-medium text-white/75 hover:text-white transition-colors" data-i="nav.about"></a>
      <a href="#contact" class="navlink text-sm font-medium text-white/75 hover:text-white transition-colors" data-i="nav.contact"></a>
      <div class="flex items-center rounded-full border border-white/10 p-0.5 text-xs font-semibold">
        <button data-lang="uk" class="lang-btn px-3 py-1 rounded-full uppercase">uk</button>
        <button data-lang="en" class="lang-btn px-3 py-1 rounded-full uppercase">en</button>
      </div>
      <button class="theme-btn w-9 h-9 rounded-full border border-white/10 flex items-center justify-center text-white/80 hover:text-white transition-colors" aria-label="Тема" data-cursor>
        <svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a href="#contact" class="magnetic bg-brand text-white px-5 py-2 rounded-full text-sm font-semibold" data-cursor data-i="nav.cta"></a>
    </div>
    <div class="flex items-center gap-3 md:hidden">
      <button class="theme-btn w-9 h-9 rounded-full border border-white/10 flex items-center justify-center text-white/80" aria-label="Тема">
        <svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <div class="flex items-center rounded-full border border-white/10 p-0.5 text-xs font-semibold">
        <button data-lang="uk" class="lang-btn px-3 py-1 rounded-full uppercase">uk</button>
        <button data-lang="en" class="lang-btn px-3 py-1 rounded-full uppercase">en</button>
      </div>
      <button id="burger" class="text-white p-1" aria-label="Меню" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-xl flex-col items-center justify-center gap-7 hidden">
  <button id="burgerClose" class="absolute top-7 right-7 text-white" aria-label="Закрити">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <a href="#services" class="mobile-link text-3xl font-light text-white" data-i="nav.services"></a>
  <a href="#process" class="mobile-link text-3xl font-light text-white" data-i="nav.process"></a>
  <a href="#team" class="mobile-link text-3xl font-light text-white" data-i="nav.team"></a>
  <a href="#about" class="mobile-link text-3xl font-light text-white" data-i="nav.about"></a>
  <a href="#contact" class="mobile-link text-3xl font-light text-white" data-i="nav.contact"></a>
  <a href="#contact" class="mobile-link mt-4 bg-brand text-white px-8 py-3 rounded-full text-lg font-semibold" data-i="nav.cta"></a>
</div>

<!-- HERO -->
<section class="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">
  <canvas id="hero-canvas" class="absolute inset-0 w-full h-full z-0 pointer-events-none" style="-webkit-mask-image:radial-gradient(ellipse 100% 85% at 50% 50%,#000 60%,transparent 100%);mask-image:radial-gradient(ellipse 100% 85% at 50% 50%,#000 60%,transparent 100%);"></canvas>
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="parallax absolute top-[-10%] left-[-10%] w-[48vw] h-[48vw] bg-cyan-500/15 rounded-full blur-[130px] animate-blob" data-speed="0.2"></div>
    <div class="parallax absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] bg-blue-600/15 rounded-full blur-[130px] animate-blob delay-2000" data-speed="0.35"></div>
    <div class="parallax absolute bottom-[-10%] left-[20%] w-[44vw] h-[44vw] bg-sky-500/12 rounded-full blur-[130px] animate-blob delay-4000" data-speed="0.5"></div>
  </div>
  <div class="container mx-auto px-6 relative z-10 text-center">
    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass mb-8 reveal">
      <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span>
      <span class="text-xs font-medium text-white/85 uppercase tracking-wider" data-i="hero.badge"></span>
    </div>
    <h1 class="text-[2.1rem] sm:text-5xl md:text-6xl lg:text-8xl font-bold mb-8 leading-[1.08] break-words">
      <span class="split text-gradient block" data-i="hero.title1"></span>
      <span class="split text-brand block" data-i="hero.title2"></span>
    </h1>
    <p class="text-lg md:text-xl text-white/70 max-w-2xl mx-auto mb-12 leading-relaxed reveal" data-i="hero.subtitle"></p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 reveal">
      <a href="#contact" class="magnetic px-8 py-4 bg-brand text-white rounded-full font-semibold text-lg hover:scale-105 transition-transform" style="box-shadow:0 0 50px -8px rgba(34,211,238,.55)" data-cursor data-i="hero.cta1"></a>
      <a href="#services" class="magnetic px-8 py-4 glass rounded-full font-semibold text-lg text-white hover:bg-white/10 transition-all" data-cursor data-i="hero.cta2"></a>
    </div>
  </div>
  <div class="scroll-hint absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 z-10">
    <span class="text-xs text-white/45 uppercase tracking-widest" data-i="hero.scroll"></span>
    <div class="w-px h-10 bg-gradient-to-b from-white/0 via-white/45 to-white/0"></div>
  </div>
</section>

<!-- MARQUEE -->
<div class="relative py-6 border-y border-white/5 overflow-hidden">
  <div class="marquee text-2xl md:text-3xl font-semibold text-white/15" id="marquee"></div>
</div>

<!-- SERVICES (bento) -->
<section id="services" class="py-14 md:py-24 relative z-10">
  <div class="container mx-auto px-6">
    <div class="mb-10 md:mb-14 max-w-3xl">
      <span class="text-sm font-semibold uppercase tracking-widest text-cyan-400 reveal" data-i="services.kicker"></span>
      <h2 class="text-4xl md:text-5xl font-bold mt-4 mb-6 reveal" data-i="services.title"></h2>
      <p class="text-lg text-white/65 leading-relaxed reveal" data-i="services.subtitle"></p>
    </div>
    <div id="svc-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5"></div>
  </div>
</section>

<!-- PROCESS -->
<section id="process" class="py-14 md:py-24 relative z-10 overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[70vw] h-[70vw] bg-blue-900/10 rounded-full blur-[150px] pointer-events-none"></div>
  <div class="container mx-auto px-6 relative z-10">
    <div class="mb-10 md:mb-14 max-w-3xl">
      <span class="text-sm font-semibold uppercase tracking-widest text-cyan-400 reveal" data-i="process.kicker"></span>
      <h2 class="text-4xl md:text-5xl font-bold mt-4 mb-6 reveal" data-i="process.title"></h2>
      <p class="text-lg text-white/65 leading-relaxed reveal" data-i="process.subtitle"></p>
    </div>
    <div id="process-grid" class="relative"></div>
  </div>
</section>

<!-- ABOUT + STATS -->
<section id="about" class="py-14 md:py-24 relative z-10 overflow-hidden">
  <div class="container mx-auto px-6 relative z-10">
    <div class="grid lg:grid-cols-2 gap-10 lg:gap-16 items-center">
      <div>
        <span class="text-sm font-semibold uppercase tracking-widest text-cyan-400 reveal" data-i="about.kicker"></span>
        <h2 class="text-4xl md:text-5xl font-bold mt-4 mb-6 reveal" data-i="about.title"></h2>
        <p class="text-lg text-white/70 leading-relaxed reveal mb-6" data-i="about.text"></p>
        <div class="flex flex-wrap gap-3 reveal" id="kved-chips"></div>
      </div>
      <div id="stats-grid" class="grid grid-cols-2 gap-5"></div>
    </div>
  </div>
</section>

<!-- TRUST / TESTIMONIALS -->
<section id="trust" class="py-14 md:py-24 relative z-10 overflow-hidden">
  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center max-w-3xl mx-auto mb-14">
      <span class="text-sm font-semibold uppercase tracking-widest text-cyan-400 reveal" data-i="trust.kicker"></span>
      <h2 class="text-4xl md:text-5xl font-bold mt-4 reveal" data-i="trust.title"></h2>
    </div>
    <div id="logos" class="flex flex-wrap items-center justify-center gap-x-12 gap-y-6 mb-16 opacity-60"></div>
    <div id="quotes" class="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto"></div>
  </div>
</section>

<!-- TEAM -->
<section id="team" class="py-14 md:py-24 relative z-10 overflow-hidden">
  <div class="container mx-auto px-6 relative z-10">
    <div class="mb-10 md:mb-14 max-w-3xl">
      <h2 class="text-3xl md:text-4xl font-bold reveal" data-i="team.kicker"></h2>
    </div>
    <div id="team-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-14 md:py-24 relative z-10 overflow-hidden">
  <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-to-t from-blue-900/25 to-transparent pointer-events-none"></div>
  <div class="container mx-auto px-6 relative z-10">
    <div class="grid lg:grid-cols-2 gap-10 lg:gap-14 lg:items-center max-w-5xl mx-auto">
      <div>
        <span class="text-sm font-semibold uppercase tracking-widest text-cyan-400 reveal" data-i="contact.kicker"></span>
        <h2 class="text-4xl md:text-5xl font-bold mt-4 mb-6 reveal"><span data-i="contact.title1"></span> <span class="text-brand" data-i="contact.title2"></span></h2>
        <p class="text-lg text-white/70 mb-10 reveal" data-i="contact.subtitle"></p>
        <div class="space-y-4 reveal" id="contact-info"></div>
        <div class="mt-8 reveal">
          <div class="text-sm text-white/55 mb-3" data-i="contact.messengers"></div>

let lang = 0;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function build(){
  $('#svc-grid').innerHTML = SVC.map((s,i)=>`
    <div class="reveal glass glass-hover rounded-2xl p-5 sm:p-6" data-cursor style="transition-delay:${(i%3)*60}ms">
      <div class="flex items-center gap-3 mb-3">
        <span class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-xl shrink-0">${s[0]}</span>
        <h3 class="text-base sm:text-lg font-semibold leading-tight tt" data-i1="${s[1]}" data-i2="${s[2]}"></h3>
      </div>
      <p class="text-white/60 text-sm leading-relaxed dd" data-i1="${s[3]}" data-i2="${s[4]}"></p>
    </div>`).join('');
  $('#process-grid').innerHTML = `
    <div class="hidden lg:block absolute top-8 left-[12.5%] right-[12.5%] h-0.5 bg-gradient-to-r from-cyan-400/50 via-sky-400/40 to-blue-600/25"></div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 relative">
      ${PROC.map((p,i)=>`
        <div class="reveal flex flex-col items-center text-center" style="transition-delay:${i*100}ms">
          <div class="relative z-10 w-16 h-16 rounded-full bg-[#080808] border border-cyan-400/30 flex items-center justify-center mb-5 shadow-[0_0_30px_-8px_rgba(34,211,238,0.55)]">
            <span class="text-2xl font-bold text-brand display">${p[0]}</span>
          </div>
          <div class="glass glass-hover rounded-2xl p-6 w-full" data-cursor>
            <h3 class="text-xl font-semibold mb-3 tt" data-i1="${p[1]}" data-i2="${p[2]}"></h3>
            <p class="text-white/65 text-sm leading-relaxed dd" data-i1="${p[3]}" data-i2="${p[4]}"></p>
          </div>
        </div>`).join('')}
    </div>`;
  $('#stats-grid').innerHTML = STATS.map((s,i)=>`
    <div class="reveal glass rounded-3xl p-8 text-center" style="transition-delay:${i*70}ms">
      <div class="text-5xl font-bold text-brand mb-2"><span class="num" data-to="${s[0]}" data-suf="${s[3]||''}">0</span></div>

function splitWords(el,text){
  el.innerHTML = text.split(' ').map(w=>`<span class="word-wrap"><span class="word">${w}</span></span>`).join(' ');
}
function applyLang(){
  document.documentElement.lang = lang===0?'uk':'en';
  $$('[data-i]').forEach(el=>{ const k=el.getAttribute('data-i'); if(D[k]) el.textContent=D[k][lang]; });
  $$('[data-ph]').forEach(el=>{ const k=el.getAttribute('data-ph'); if(D[k]){ el.placeholder=D[k][lang]; el.setAttribute('aria-label',D[k][lang]); } });
  $$('.tt').forEach(el=> el.textContent = lang===0?el.dataset.i1:el.dataset.i2);
  $$('.dd').forEach(el=> el.textContent = lang===0?el.dataset.i1:el.dataset.i2);
  $$('.qt').forEach(el=> el.textContent = lang===0?el.dataset.i1:el.dataset.i2);
  $$('.qa').forEach(el=> el.textContent = lang===0?el.dataset.i1:el.dataset.i2);
  $$('.split').forEach(el=>{ const k=el.getAttribute('data-i'); splitWords(el, D[k][lang]); if(el.closest('.in')||el.classList.contains('seen')) revealWords(el); });
  const fn = lang===0?'ТОВ «ТАСОФТ»':'TASOFT LLC';
  $('#f-name').textContent=fn; $('#f-edrpou').textContent=(lang===0?'ЄДРПОУ':'EDRPOU')+': 44454047';
  $('#f-copy').textContent=`© 2026 ${fn}. ${D['footer.rights'][lang]}`;
  $('#f-loc').textContent=lang===0?'м. Київ, Україна':'Kyiv, Ukraine';
  $$('.lang-btn').forEach(b=>{ const a=(b.dataset.lang==='uk'&&lang===0)||(b.dataset.lang==='en'&&lang===1); b.className='lang-btn px-3 py-1 rounded-full uppercase transition-colors '+(a?'bg-white text-black':'text-white/60 hover:text-white'); });
}
function revealWords(el){ el.querySelectorAll('.word').forEach((w,i)=>{ setTimeout(()=>w.classList.add('in'), 60*i); }); }

function countUp(el){
  const to=parseFloat(el.dataset.to), suf=el.dataset.suf||''; let cur=0; const dur=1400, t0=performance.now();
  function step(t){ const p=Math.min((t-t0)/dur,1); const e=1-Math.pow(1-p,3); el.textContent=Math.round(to*e)+suf; if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

function heroCanvas(){
  if(RM) return;
  const c=$('#hero-canvas'), x=c.getContext('2d'); const dpr=Math.min(devicePixelRatio||1,2);
  let w=0,h=0,pts=[]; const mouse={x:-9999,y:-9999};
  function size(){
    w=c.clientWidth||c.offsetWidth||window.innerWidth; h=c.clientHeight||c.offsetHeight||window.innerHeight;
    c.width=w*dpr; c.height=h*dpr; x.setTransform(dpr,0,0,dpr,0,0);
    if(!pts.length && w>10 && h>10){ const N=Math.max(26,Math.min(w<640?42:110,Math.round(w*h/12500)));
      for(let i=0;i<N;i++) pts.push({x:Math.random()*w,y:Math.random()*h,bx:(Math.random()-.5)*.22,by:(Math.random()-.5)*.22,vx:0,vy:0}); }
  }
  size(); window.addEventListener('resize',size); window.addEventListener('load',size);
  window.addEventListener('mousemove',e=>{ const r=c.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });
  window.addEventListener('mouseleave',()=>{ mouse.x=-9999; mouse.y=-9999; });
  const LINK=130, R=160;
  function loop(){
    x.clearRect(0,0,w,h);
    // Move: gentle base drift + repulsion away from the cursor with friction
    for(const p of pts){
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.hypot(dx,dy);
      if(d<R && d>0.5){ const f=(1-d/R)*1.2; p.vx+=(dx/d)*f; p.vy+=(dy/d)*f; }
      p.vx*=0.92; p.vy*=0.92;
      p.x+=p.vx+p.bx; p.y+=p.vy+p.by;
      if(p.x<0||p.x>w) p.bx*=-1;
      if(p.y<0||p.y>h) p.by*=-1;
      p.x=Math.max(0,Math.min(w,p.x)); p.y=Math.max(0,Math.min(h,p.y));
    }
    // Links between nearby particles
    for(let i=0;i<pts.length;i++){
      const a=pts[i];
      for(let j=i+1;j<pts.length;j++){ const b=pts[j],dd=Math.hypot(a.x-b.x,a.y-b.y);
        if(dd<LINK){ x.strokeStyle=`rgba(56,189,248,${.22*(1-dd/LINK)})`; x.lineWidth=1; x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke(); } }
    }
    // Nodes: glow brighter the closer they are to the cursor
    for(const p of pts){
      const dm=Math.hypot(p.x-mouse.x,p.y-mouse.y), near=dm<R;
      x.fillStyle = near ? `rgba(165,243,252,${.4+.5*(1-dm/R)})` : 'rgba(103,232,249,.6)';
      x.beginPath(); x.arc(p.x,p.y, near?2.4:1.6, 0,7); x.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
}

document.addEventListener('DOMContentLoaded',()=>{
  build(); applyLang(); heroCanvas();
  // intro
  const intro=$('#intro');
  intro.querySelector('.lg').innerHTML = '<span class="intro-wrap"><span class="intro-rise" style="animation-delay:.05s">TA</span></span><span class="intro-wrap"><span class="intro-rise" style="animation-delay:.16s;color:#38bdf8">SOFT</span></span>';
  setTimeout(()=>intro.classList.add('hide'), RM?80:850);

  $$('.lang-btn').forEach(b=> b.addEventListener('click',()=>{ lang=b.dataset.lang==='uk'?0:1; applyLang(); }));

  // theme toggle (persisted)
  const root=document.documentElement;
  function setTheme(t){ root.classList.toggle('light', t==='light'); try{ localStorage.setItem('tasoft-theme',t); }catch(e){} }
  try{ const s=localStorage.getItem('tasoft-theme'); if(s) setTheme(s); }catch(e){}
  $$('.theme-btn').forEach(b=> b.addEventListener('click',()=> setTheme(root.classList.contains('light')?'dark':'light')));

  // mobile menu
  const mm=$('#mobileMenu'), burger=$('#burger');
  const openMenu=()=>{ mm.style.display='flex'; burger&&burger.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; };
  const closeMenu=()=>{ mm.style.display='none'; burger&&burger.setAttribute('aria-expanded','false'); document.body.style.overflow=''; };
  burger&&burger.addEventListener('click',openMenu);
  $('#burgerClose')&&$('#burgerClose').addEventListener('click',closeMenu);
  $$('#mobileMenu .mobile-link').forEach(a=> a.addEventListener('click',closeMenu));

  // reveal observer
  const io=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); if(e.target.classList.contains('split')){e.target.classList.add('seen');revealWords(e.target);} e.target.querySelectorAll&&e.target.querySelectorAll('.num').forEach(countUp); io.unobserve(e.target);} }); },{threshold:.15});
  $$('.reveal,.split').forEach(el=>io.observe(el));
  $$('.num').forEach(n=>{ const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){countUp(e.target);ob.unobserve(e.target);}})},{threshold:.5}); ob.observe(n); });

  // Lenis smooth scroll
  if(!RM && window.Lenis){
    const lenis=new Lenis({duration:1.1,smoothWheel:true}); window.__lenis=lenis;
    function raf(t){ lenis.raf(t); requestAnimationFrame(raf); } requestAnimationFrame(raf);
    $$('a[href^="#"]').forEach(a=>a.addEventListener('click',e=>{ const id=a.getAttribute('href'); if(id.length>1){ e.preventDefault(); lenis.scrollTo(id,{offset:-80}); } }));
  }

  // progress + navbar + parallax
  const prog=$('#progress'), nav=$('#nav');
  function onScroll(){ const sc=window.scrollY, max=document.body.scrollHeight-innerHeight; prog.style.width=(sc/max*100)+'%'; nav.classList.toggle('nav-scrolled',sc>50);
    if(!RM) $$('.parallax').forEach(p=> p.style.transform=`translateY(${sc*parseFloat(p.dataset.speed)*-0.15}px)`); }
  window.addEventListener('scroll',onScroll,{passive:true});

  // back-to-top
  const toTop=$('#toTop');
  if(toTop){
    window.addEventListener('scroll',()=>{ toTop.classList.toggle('show', window.scrollY>600); },{passive:true});
    toTop.addEventListener('click',()=>{ if(window.__lenis) window.__lenis.scrollTo(0,{duration:1}); else window.scrollTo({top:0,behavior:'smooth'}); });
  }

  // custom cursor + magnetic
  const cur=$('.cur'), ring=$('.cur-ring'); let mx=0,my=0,rx=0,ry=0;
  window.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
  function ringLoop(){ rx+=(mx-rx)*.18; ry+=(my-ry)*.18; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(ringLoop); } ringLoop();
  $$('[data-cursor]').forEach(el=>{ el.addEventListener('mouseenter',()=>{cur.classList.add('big');ring.style.opacity=0;}); el.addEventListener('mouseleave',()=>{cur.classList.remove('big');ring.style.opacity=1;}); });
  if(!RM) $$('.magnetic').forEach(el=>{
    el.addEventListener('mousemove',e=>{ const r=el.getBoundingClientRect(); const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2); el.style.transform=`translate(${dx*.3}px,${dy*.4}px)`; });
    el.addEventListener('mouseleave',()=> el.style.transform='');
  });

  // form submit
  const form=$('#form');
  if(form) form.addEventListener('submit',e=>{ e.preventDefault(); if(!e.target.name.value||!e.target.email.value) return; $('#form-ok').classList.remove('hidden'); const b=e.target.querySelector('button[type=submit]'); if(b) b.style.display='none'; });
});
</script>
